name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install PyMuPDF python-docx Pillow PySide6 pyinstaller

      - name: Build EXE
        run: pyinstaller pdf2word.spec --noconfirm --clean

      - name: Upload EXE
        uses: softprops/action-gh-release@v2
        with:
          files: dist/pdf2word.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install PyMuPDF python-docx Pillow PySide6 pyinstaller

      - name: Build app
        run: pyinstaller pdf2word.spec --noconfirm --clean

      - name: Cleanup build cache
        run: rm -rf build

      - name: Create DMG
        run: |
          mkdir -p dist/dmg
          cp -R dist/pdf2word dist/dmg/
          ln -sf /Applications dist/dmg/Applications
          hdiutil create -volname "PDF转WORD" \
            -srcfolder dist/dmg \
            -ov -format UDZO \
            -size 200m \
            dist/PDF转WORD转换器.dmg

      - name: Upload DMG
        uses: softprops/action-gh-release@v2
        with:
          files: dist/PDF转WORD转换器.dmg
